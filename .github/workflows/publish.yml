# Publish npm + PyPI when a git tag starting with "v" is pushed.
# You need to create the secrets once, then tagging v0.1.x auto-publishes.
#
# Secrets required (Settings → Secrets and variables → Actions):
#   - NPM_TOKEN  — an npm automation token with publish scope for @dobi/sdk
#   - PYPI_TOKEN — a PyPI API token for the `dobi` project
#
# Until those are set, this workflow is a no-op — it'll skip both jobs
# because they gate on the secrets existing.

name: publish

on:
  push:
    tags:
      - 'v*'

jobs:
  npm:
    runs-on: ubuntu-latest
    environment: npm
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org
      - name: Publish @dobi/sdk
        if: env.NPM_TOKEN != ''
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade build twine
          python -m build
      - name: Upload to PyPI
        if: env.TWINE_PASSWORD != ''
        run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
